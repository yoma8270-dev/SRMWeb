<!DOCTYPE html>
<html>

<head>

<title>Edit Result</title>

<style>

body{
    font-family:Arial;
    background:#1e3c72;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
}

button{
    padding:10px 20px;
    margin-top:10px;
    cursor:pointer;
}

.subject-box{
    background:#f2f2f2;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h1>Edit Student Result</h1>

<input
type="text"
id="schoolName"
placeholder="School Name">

<input
type="text"
id="studentStd"
placeholder="Class">

<input
type="text"
id="studentName"
placeholder="Student Name">

<input
type="text"
id="rollNumber"
placeholder="Roll Number">

<hr>

<div id="subjectsContainer"></div>

<button onclick="addSubject()">
Add Subject
</button>

<button onclick="updateResult()">
Update Result
</button>

<button onclick="window.location.href='results.html'">
Back
</button>

</div>

<script type="module" src="editResult.js"></script>

</body>

</html>

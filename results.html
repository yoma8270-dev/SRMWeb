<!DOCTYPE html>
<html>

<head>

    <title>View Results</title>

    <style>

        body{
            font-family:Arial;
            background:#1e3c72;
            padding:20px;
        }

        .container{
            max-width:1000px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#1e3c72;
            color:white;
        }

        th,td{
            border:1px solid black;
            padding:10px;
            text-align:center;
        }

        button{
            padding:8px 15px;
            cursor:pointer;
        }

        .top-bar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:20px;
        }

        #searchBox{
        width:250px;
        padding:10px;
        border:2px solid #1e3c72;
        border-radius:6px;
        font-size:16px;
        outline:none;
        }

        #searchBox:focus{
        border-color:#0f172a;
        box-shadow:0 0 5px rgba(0,0,0,0.3);
        }
    </style>

</head>

<body>

<div class="container">

    <h1>Saved Results</h1>

    <hr>

    <div class="top-bar">

         
        <input
        type="text"
        id="searchBox"
        placeholder="Search Student"
        onkeyup="searchStudent()">

        <select
        id="classFilter"
        onchange="filterClass()">

        <option value="">
        All Classes
        </option>

        </select>   



    </div>  
    

    <table>

    <thead>
    <tr>
    <th>Roll No</th>
    <th>Name</th>
    <th>Class</th>
    <th>Percentage</th>
    <th>Grade</th>
    <th>Status</th>
    <th>Action</th>
    </tr>
    </thead>

    <tbody id="resultsBody">

    </tbody>

    </table>

    </div>

    

    <script type="module"
    src="results.js"></script>

</body>

</html>
